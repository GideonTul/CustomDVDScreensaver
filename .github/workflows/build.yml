name: Build & Release Windows EXE

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name camil --add-data "camil.jpeg;." camil.py

      - name: Debug output (verify EXE exists)
        run: dir dist

      - name: Upload artifact (backup download)
        uses: actions/upload-artifact@v4
        with:
          name: camil-exe
          path: dist/camil.exe

      - name: Create GitHub Release + Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/camil.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
